name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - dev
      - stage
  pull_request:
    branches:
      - main
      - stage

jobs:
  build:
    name: Build and Validate Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t task-manager-flask:ci .

      - name: Run container
        run: |
          docker run -d --name task-manager-test -p 8080:5000 task-manager-flask:ci
          sleep 5

      - name: Check running container
        run: docker ps

      - name: Validate application response
        run: curl -I http://localhost:8080 || exit 1

      - name: Show container logs
        if: always()
        run: docker logs task-manager-test || true
