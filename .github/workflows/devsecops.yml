name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - dev
      - stage
  pull_request:
    branches:
      - main
      - stage

jobs:
  test:
    name: Automated Tests (Unit / Integration / Functional)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: todo_project
        env:
          SECRET_KEY: test-secret-key
          SQLALCHEMY_DATABASE_URI: "sqlite:///:memory:"
        run: |
          pytest tests/ -v \
            --cov=todo_project \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: todo_project/coverage.xml

  build:
    name: Build and Validate Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t task-manager-flask:ci .

      - name: Run container
        run: |
          docker run -d --name task-manager-test \
            -e SECRET_KEY=ci-secret-key \
            -e SQLALCHEMY_DATABASE_URI=sqlite:///site.db \
            -p 8080:5000 task-manager-flask:ci
          sleep 5

      - name: Check running container
        run: docker ps

      - name: Validate application response
        run: curl -I http://localhost:8080 || exit 1

      - name: Show container logs
        if: always()
        run: docker logs task-manager-test || true

  sast:
    name: Static Security Analysis with Bandit
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST
        run: |
          bandit -r todo_project \
            --exclude todo_project/tests \
            -f txt -o bandit-report.txt || true
          cat bandit-report.txt

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt
